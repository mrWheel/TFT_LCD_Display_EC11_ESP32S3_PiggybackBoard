<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STL Viewer</title>

  <style>
    body
    {
      margin: 0;
      overflow: hidden;
      background-color: #202020;
    }

    canvas
    {
      display: block;
    }

    #info
    {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ffffff;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 8px 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  {
    "imports":
    {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

<div id="info">Loading STL...</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const info = document.getElementById('info');

const params = new URLSearchParams(window.location.search);
const fileName = params.get('file');

if (!fileName)
{
  info.textContent = 'Error: missing file parameter';
  throw new Error('Missing file parameter');
}

if (!fileName.toLowerCase().endsWith('.stl'))
{
  info.textContent = 'Error: file must be an .stl file';
  throw new Error('Invalid file type');
}

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x303030);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  10000
);

const renderer = new THREE.WebGLRenderer(
{
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const light = new THREE.DirectionalLight(0xffffff, 1.0);

light.position.set(100, 100, 100);

scene.add(light);

const loader = new STLLoader();

loader.load(
  fileName,

  function (geometry)
  {
    geometry.center();
    geometry.computeBoundingBox();

    const material = new THREE.MeshPhongMaterial(
    {
      color: 0x00aaff
    });

    const mesh = new THREE.Mesh(geometry, material);

    scene.add(mesh);

    const box = geometry.boundingBox;
    const size = new THREE.Vector3();

    box.getSize(size);

    const maxDimension = Math.max(size.x, size.y, size.z);

    camera.position.set(
      maxDimension * 1.5,
      -maxDimension * 2.0,
      maxDimension * 1.5
    );

    camera.lookAt(0, 0, 0);

    controls.target.set(0, 0, 0);

    controls.update();

    info.textContent = fileName;
  },

  function (xhr)
  {
    if (xhr.lengthComputable)
    {
      info.textContent = 'Loading: ' + Math.round((xhr.loaded / xhr.total) * 100) + '%';
    }
  },

  function (error)
  {
    info.textContent = 'Error: could not load STL file';
    console.error(error);
  }
);

window.addEventListener(
  'resize',

  function ()
  {
    camera.aspect = window.innerWidth / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);
  }
);

function animate()
{
  requestAnimationFrame(animate);

  controls.update();

  renderer.render(scene, camera);

}   //   animate()

animate();
</script>

</body>
</html>
